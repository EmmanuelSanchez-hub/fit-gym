# fly.toml app configuration file generated for cabofit-whatsapp on 2026-07-01T23:23:51-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cabofit-whatsapp'
primary_region = 'lax'

[build]
  image = 'node:20-alpine'

[env]
  NODE_ENV = 'production'
  PORT = '3004'

[[mounts]]
  source = 'whatsapp_data'
  destination = '/data'

[http_service]
  internal_port = 3004
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 3004
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '5s'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
